      id: "people-screen-ready"
    timeout: 15000
- runFlow: helpers/assert-capture-ready.yaml
- takeScreenshot: ${MAESTRO_SCREENSHOT_DIR}/light/people

- openLink: "owed://home"
- extendedWaitUntil:
    visible:
      id: "home-screen-ready"
    timeout: 15000
- tapOn: ".*Notifications.*"
- extendedWaitUntil:
    visible: ".*Due today.*"
    timeout: 15000
- runFlow: helpers/assert-capture-ready.yaml
- takeScreenshot: ${MAESTRO_SCREENSHOT_DIR}/light/reminders

